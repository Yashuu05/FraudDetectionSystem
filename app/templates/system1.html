<!DOCTYPE html>

<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>AI Fraud Detection</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;display=swap" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface": "#0c0c0f",
            "surface-container-lowest": "#09090b",
            "on-primary": "#0a0012",
            "secondary": "#71717a",
            "on-secondary-fixed": "#18181b",
            "error-container": "#3b1111",
            "surface-container-highest": "#1e1e22",
            "on-background": "#fafafa",
            "outline": "#52525b",
            "inverse-primary": "#5b21b6",
            "surface-dim": "#0c0c0f",
            "on-surface-variant": "#a1a1aa",
            "on-primary-fixed": "#2e1065",
            "surface-container": "#121215",
            "on-tertiary-fixed-variant": "#047857",
            "on-secondary-container": "#a1a1aa",
            "secondary-container": "#27272a",
            "primary-fixed": "#ede9fe",
            "primary-container": "#7c3aed",
            "tertiary-container": "#065f46",
            "tertiary-fixed": "#bbf7d0",
            "secondary-fixed-dim": "#71717a",
            "primary": "#a78bfa",
            "on-tertiary-container": "#bbf7d0",
            "on-surface": "#fafafa",
            "tertiary-fixed-dim": "#6ee7b7",
            "secondary-fixed": "#a1a1aa",
            "on-error-container": "#fca5a5",
            "inverse-surface": "#fafafa",
            "on-error": "#1a0000",
            "background": "#09090b",
            "on-secondary-fixed-variant": "#3f3f46",
            "inverse-on-surface": "#09090b",
            "surface-bright": "#18181b",
            "on-primary-fixed-variant": "#5b21b6",
            "error": "#ef4444",
            "tertiary": "#34d399",
            "surface-tint": "#a78bfa",
            "on-primary-container": "#ede9fe",
            "outline-variant": "#27272a",
            "on-tertiary": "#001a12",
            "on-secondary": "#09090b",
            "primary-fixed-dim": "#c4b5fd",
            "on-tertiary-fixed": "#003318",
            "surface-variant": "#18181b",
            "surface-container-low": "#0f0f12",
            "surface-container-high": "#18181b"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Geist"],
            "body": ["Geist"],
            "label": ["Geist"]
          }
        },
      },
    }
  </script>
  <link href="{{ url_for('static', filename='system1.css') }}" rel="stylesheet" />
</head>

<body class="bg-background text-on-background h-screen flex overflow-hidden">
  <!-- SideNavBar (Shared Component) -->
  <aside
    class="flex flex-col w-64 h-screen pt-4 bg-[#0c0c0f] font-geist text-sm docked left-0 border-r border-zinc-800 shrink-0">
    <div class="px-6 mb-8">
      <h1 class="text-lg font-black text-violet-400">Fraud Engine</h1>
      <p class="text-zinc-500 text-[10px] tracking-widest uppercase">Developed by YC</p>
    </div>
    <nav class="flex-1 space-y-1">
      <a class="flex items-center px-6 py-3 transition-all duration-200 bg-zinc-800 text-violet-400 border-r-2 border-violet-400"
        href="#">
        <span class="material-symbols-outlined mr-3" data-icon="dashboard">dashboard</span>
        <span>Dashboard</span>
      </a>
      <a class="flex items-center px-6 py-3 transition-all duration-200 text-zinc-500 hover:bg-zinc-800/50 hover:text-zinc-200"
        href="#">
        <span class="material-symbols-outlined mr-3" data-icon="receipt_long">receipt_long</span>
        <span>Transactions</span>
      </a>
      <a class="flex items-center px-6 py-3 transition-all duration-200 text-zinc-500 hover:bg-zinc-800/50 hover:text-zinc-200"
        href="#">
        <span class="material-symbols-outlined mr-3" data-icon="security">security</span>
        <span>Risk Models</span>
      </a>
      <a class="flex items-center px-6 py-3 transition-all duration-200 text-zinc-500 hover:bg-zinc-800/50 hover:text-zinc-200"
        href="#">
        <span class="material-symbols-outlined mr-3" data-icon="warning">warning</span>
        <span>Alerts</span>
      </a>
    </nav>


  </aside>
  <div class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
    <!-- TopNavBar (Shared Component) -->
    <header
      class="flex justify-between items-center w-full px-6 h-16 bg-[#09090b] text-violet-400 font-geist tracking-tight docked full-width top-0 border-b border-zinc-800 shrink-0">
      <div class="flex items-center gap-8">
        <span class="text-xl font-bold text-[#fafafa]">AI Fraud Detection</span>
        <div class="hidden lg:flex items-center gap-6">
          <a class="text-violet-400 font-bold border-b-2 border-violet-400 py-5" href="#">Live Monitor</a>
        </div>

      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2 mr-4">
          <button id="start-btn"
            class="flex items-center gap-2 px-4 py-1.5 rounded bg-primary text-on-primary font-bold text-xs active:scale-95 duration-100 uppercase tracking-widest">
            <span class="material-symbols-outlined text-sm" data-icon="play_arrow">play_arrow</span>
            Start
          </button>
          <button id="stop-btn"
            class="flex items-center gap-2 px-4 py-1.5 rounded border border-outline-variant text-zinc-400 font-bold text-xs active:scale-95 duration-100 uppercase tracking-widest hover:bg-error/10 hover:text-error hover:border-error">
            <span class="material-symbols-outlined text-sm" data-icon="stop">stop</span>
            Stop
          </button>
        </div>

      </div>
    </header>
    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-h-0 bg-background p-6 overflow-hidden" style="height: calc(100vh - 4rem);">
      <!-- Controls Bar (Bento-lite) -->
      <section class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 shrink-0">

        <div class="col-span-1 bg-surface-container border border-outline-variant rounded-xl p-4 flex flex-col gap-3">
          <div class="flex items-center justify-between">
            <label class="text-xs font-bold text-on-surface-variant uppercase tracking-tighter">Time Interval
              (sec)</label>
            <span class="material-symbols-outlined text-primary text-sm" data-icon="speed">speed</span>
          </div>
          <input id="time-interval"
            class="bg-surface-container-low border border-outline-variant rounded-lg px-4 py-2 text-xl font-bold text-primary focus:ring-2 focus:ring-primary focus:outline-none"
            step="0.1" type="number" value="1.5" placeholder="5" />
        </div>
        <div class="col-span-1 bg-surface-container border border-outline-variant rounded-xl p-4 flex flex-col gap-3">
          <div class="flex items-center justify-between">
            <label class="text-xs font-bold text-on-surface-variant uppercase tracking-tighter">Number of
              Transactions</label>
            <span class="material-symbols-outlined text-primary text-sm" data-icon="data_usage">data_usage</span>
          </div>
          <input id="num-transactions"
            class="bg-surface-container-low border border-outline-variant rounded-lg px-4 py-2 text-xl font-bold text-primary focus:ring-2 focus:ring-primary focus:outline-none"
            type="number" value="20" placeholder="20" />
        </div>

      </section>
      <!-- Scrollable Transaction List -->
      <div class="flex-1 flex flex-col min-h-0">
        <div class="flex items-center justify-between mb-4 px-2">
          <h2 class="text-sm font-black text-[#fafafa] uppercase tracking-widest flex items-center gap-2">
            <span class="material-symbols-outlined text-primary" data-icon="reorder">reorder</span>
            Live Transaction Stream
          </h2>
          <div class="flex items-center gap-2 text-[10px] text-on-surface-variant font-medium">
            <span class="flex items-center gap-1">
              <div class="w-2 h-2 rounded-full bg-tertiary"></div>Live monitoring
            </span>
          </div>
        </div>
        <div id="transaction-stream" class="flex-1 overflow-y-auto pr-2 space-y-3 custom-scrollbar">
          <!-- Cards will be injected here -->
        </div>
      </div>
    </main>
  </div>

  <script>
    let simulationInterval = null;
    let transactionsGenerated = 0;

    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const stream = document.getElementById('transaction-stream');
    const timeInput = document.getElementById('time-interval');
    const countInput = document.getElementById('num-transactions');

    async function fetchTransaction() {
      try {
        const response = await fetch('/generate_transaction', { method: 'POST' });
        const data = await response.json();

        if (data.error) {
          console.error('Error generating data:', data.error);
          return;
        }

        appendCard(data);
        transactionsGenerated++;

        if (transactionsGenerated >= parseInt(countInput.value)) {
          stopSimulation();
        }
      } catch (err) {
        console.error('Fetch error:', err);
      }
    }

    function appendCard(tx) {
      const card = document.createElement('div');
      
      // Determine colors based on risk status
      let statusColor = "primary"; // Default (SAFE)
      let statusBg = "bg-primary/20";
      let borderColor = "border-outline-variant";
      let accentColor = "bg-primary";
      
      if (tx.risk_status === "CRITICAL") {
        statusColor = "error";
        statusBg = "bg-error/20";
        borderColor = "border-error/50";
        accentColor = "bg-error";
      } else if (tx.risk_status === "WARNING") {
        statusColor = "amber-400";
        statusBg = "bg-amber-400/20";
        borderColor = "border-amber-400/50";
        accentColor = "bg-amber-400";
      }

      card.className = `group bg-surface-container border ${borderColor} hover:border-primary/50 transition-all rounded-xl p-5 flex flex-col md:flex-row gap-6 relative overflow-hidden animate-in fade-in slide-in-from-top-4 duration-500`;

      card.innerHTML = `
        <div class="absolute left-0 top-0 bottom-0 w-1 ${accentColor}"></div>
        <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-1">
            <div class="flex items-center gap-2">
              <span class="px-2 py-0.5 rounded text-[10px] font-black bg-zinc-800 text-zinc-400 uppercase">${tx.type}</span>
              <span class="px-2 py-0.5 rounded text-[10px] font-black ${statusBg} text-${statusColor} uppercase">${tx.risk_status}</span>
            </div>
            <h3 class="text-2xl font-black text-on-surface mt-2 tracking-tight">INR ${tx.amount.toLocaleString()}</h3>
            <p class="text-[10px] font-mono text-on-surface-variant">TXID: ${tx.transaction_id} | ${tx.date_time}</p>
          </div>
          <div class="flex flex-col justify-center space-y-1">
            <div class="flex items-center justify-between mb-2">
              <p class="text-[10px] font-bold text-on-surface-variant uppercase">Risk Score</p>
              <p class="text-lg font-black text-${statusColor}">${(tx.risk_score * 100).toFixed(1)}%</p>
            </div>
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-xs text-on-surface-variant" data-icon="account_balance">account_balance</span>
              <p class="text-xs text-on-surface">${tx.sender_bank} → ${tx.reciever_bank}</p>
            </div>
          </div>
        </div>
        <div class="flex items-center">
          <button class="w-full md:w-auto px-6 py-2.5 rounded-lg border border-outline-variant text-xs font-bold hover:bg-zinc-800 transition-colors flex items-center justify-center gap-2">
            Details
            <span class="material-symbols-outlined text-sm" data-icon="chevron_right">chevron_right</span>
          </button>
        </div>
      `;

      // Prepend to show new transactions at the top, or append if desired. 
      // User said "one by one below each card similar to the queue", usually implies appending.
      stream.appendChild(card);

      // Auto-scroll to bottom with requestAnimationFrame to ensure DOM is updated
      requestAnimationFrame(() => {
        stream.scrollTo({
          top: stream.scrollHeight,
          behavior: 'smooth'
        });
      });
    }

    function startSimulation() {
      if (simulationInterval) return;

      transactionsGenerated = 0;
      stream.innerHTML = '';

      const intervalMs = parseFloat(timeInput.value) * 1000;

      startBtn.disabled = true;
      startBtn.classList.add('opacity-50');

      fetchTransaction(); // Start first one immediately
      simulationInterval = setInterval(fetchTransaction, intervalMs);


    }

    function stopSimulation() {
      if (simulationInterval) {
        clearInterval(simulationInterval);
        simulationInterval = null;
      }
      startBtn.disabled = false;
      startBtn.classList.remove('opacity-50');


    }

    startBtn.addEventListener('click', startSimulation);
    stopBtn.addEventListener('click', stopSimulation);
  </script>
</body>

</html>
